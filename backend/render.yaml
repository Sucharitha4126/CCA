services:
  - type: web
    name: sentinelpay-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        value: neo4j
      - key: NEO4J_PASSWORD
        sync: false
      - key: ALERT_EMAIL_ENABLED
        value: true
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: ALERT_FROM_EMAIL
        sync: false
      - key: ALERT_TO_EMAIL
        value: sucharitha4126@gmail.com
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: OUTGOING_WEBHOOK_URL
        sync: false
